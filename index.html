<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Gästehaus 22 – Zimmer für Arbeiter in Asten</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f5f5f5;
      --card: #ffffff;
      --accent: #222222;
      --accent-soft: #666666;
      --highlight: #e0b400;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      background: var(--bg);
      color: #111;
      line-height: 1.6;
    }

    header {
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #e3e3e3;
    }

    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-soft);
      font-size: 0.8rem;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      border-radius: 999px;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--accent);
    }

    h1 {
      font-size: clamp(2rem, 3vw, 2.6rem);
      margin-bottom: 0.5rem;
      letter-spacing: 0.03em;
    }

    .subtitle {
      color: var(--accent-soft);
      font-size: 0.95rem;
    }

    main {
      max-width: 1040px;
      margin: 2rem auto 3rem;
      padding: 0 1.5rem;
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 1.4fr);
      gap: 1.75rem;
    }

    @media (max-width: 800px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 1.75rem 1.5rem;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.04);
    }

    .card + .card {
      margin-top: 1rem;
    }

    h2 {
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 600;
      color: var(--accent-soft);
      margin-bottom: 1rem;
    }

    p {
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
    }

    ul {
      list-style: none;
      margin-top: 0.25rem;
    }

    li {
      font-size: 0.95rem;
      margin-bottom: 0.4rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }

    li::before {
      content: "•";
      color: var(--accent);
      font-size: 1.1rem;
      line-height: 1;
      margin-top: 0.05rem;
    }

    .price-tag {
      display: inline-flex;
      align
