<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästehaus 22 | Unterkunft in Asten</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f4f7f6;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: var(--light);
        }

        header {
            background: var(--primary);
            color: var(--white);
            padding: 2rem 1rem;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 2rem;
        }

        .hero-info {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .hero-info { grid-template-columns: 1fr; }
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        .price-tag {
            background: var(--accent);
            color: white;
            padding: 1rem;
            border-radius: 5px;
            display: inline-block;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .feature-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
        }

        .contact-box {
            background: var(--primary);
            color: white;
            padding: 2.5rem;
            text-align: center;
            border-radius: 8px;
            margin-top: 3rem;
        }

        .btn {
            background: var(--accent);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #777;
        }

        ul { padding-left: 20px; }
        li { margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Gästehaus 22</h1>
    <p>Ihre gemütliche Unterkunft für Arbeiter & Monteure in Asten</p>
</header>
