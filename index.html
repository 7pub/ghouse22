<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästehaus 22 | Asten - Unterkunft für Arbeiter</title>
    <style>
        :root {
            --primary-color: #2c3e50; /* Dunkelblau für Text und Header */
            --accent-color: #e67e22;  /* Orange für Akzente und Preise */
            --bg-color: #f4f7f6;      /* Heller Hintergrund */
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: var(--bg-color);
        }

        /* Header mit Logo */
        header {
            background: var(--primary-color);
            color: var(--white);
            padding: 2rem 1rem;
            text-align: center;
        }

        .logo-container img {
            max-width: 150px;
            height: auto;
            margin-bottom: 1rem;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        header p {
            margin: 0.5rem 0 0;
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Hauptcontainer */
        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Preis-Highlight-Box */
        .price-hero {
            background: var(--white);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 2rem;
        }

        .price-tag {
            background: var(--accent-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            display: inline-block;
            font-size: 2rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
        }

        .price-info {
            margin-top: 1rem;
            color: #7f8c8d;
        }

        /* Sektionen */
        section {
            margin-bottom: 3rem;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 10px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        /* Galerie-Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
        }

        .gallery-item {
            background: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-item p {
            padding: 1rem;
            margin: 0;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
        }

        /* Ausstattungs-Liste */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .feature-card {
            background: var(--white);
            padding: 1.5rem;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .feature-card h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        /* Kontakt-Box */
        .contact-box {
            background: var(--primary-color);
            color: white;
            padding: 3rem;
            text-align: center;
            border-radius: 8px;
            margin-top: 4rem;
        }

        .contact-box h2 {
            color: white;
            border-color: white;
        }

        .contact-details p {
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #d35400;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            background: #ecf0f1;
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 2rem;
        }

        /* Responsive Anpassungen */
        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .price-tag { font-size: 1.5rem; }
            .contact-box { padding: 1.5rem; }
        }
    </style>
</head>
