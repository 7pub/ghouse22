<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entfernungsrechner Pro</title>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #2563eb;
            --error: #dc2626;
            --bg: #f8fafc;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #manual-input-container {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
            display: none; /* Initial versteckt */
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.5rem;
            margin-bottom: 0.75rem;
            box-sizing: border-box;
        }
        #result { margin-top: 1.5rem; font-size: 1.1rem; }
        .error-text { color: var(--error); font-size: 0.875rem; margin-top: 0.5rem; }
        .icon { width: 18px; height: 18px; }
    </style>
</head>
<body>

<div class="card">
    <i data-lucide="map-pin" style="color: var(--primary); margin-bottom: 1rem;"></i>
    <h2>Entfernung prüfen</h2>
    <p>Wie weit ist es zum Eiffelturm?</p>
    
    <button id="geoBtn" class="btn">
        <i data-lucide="navigation" class="icon"></i> Meinen Standort nutzen
    </button>

    <div id="manual-input-container">
        <p style="font-size: 0.9rem; color: #64748b;">Standort konnte nicht ermittelt werden. Bitte gib deine Stadt oder PLZ ein:</p>
        <input type="text" id="addressInput" placeholder="z.B. München oder 10117">
        <button id="manualBtn" class="btn" style="background-color: #475569;">Berechnen</button>
    </div>
    
    <div id="result"></div>
</div>

<script>
    // Ziel: Eiffelturm
    const TARGET = { lat: 48.8584, lon: 2.2945 };

    const geoBtn = document.getElementById('geoBtn');
    const manualBtn = document.getElementById('manualBtn');
    const manualContainer = document.getElementById('manual-input-container');
    const addressInput = document.getElementById('addressInput');
    const resultDiv = document.getElementById('result');

    // Initialisiere Lucide Icons
    lucide.createIcons();

    // Mathematische Formel
    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * 
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function showResult(dist) {
        resultDiv.innerHTML = `Distanz: <strong>${dist.toFixed(1)} km</strong>`;
        manualContainer.style.display = 'none';
    }

    // Geocoding Funktion (Adresse -> Koordinaten)
    async function geocodeAddress(address) {
        try {
            const response = await fetch(`<https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1>`);
            const data = await response.json();
            if (data.length > 0) {
                return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
            }
            throw new Error("Ort nicht gefunden");
        } catch (err) {
            alert("Fehler: " + err.message);
            return null;
        }
    }

    // Automatisches Geolocation
    geoBtn.addEventListener('click', () => {
        geoBtn.disabled = true;
        resultDiv.innerText = "Suche Standort...";

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const d = haversine(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lon);
                showResult(d);
                geoBtn.disabled = false;
            },
            (err) => {
                console.warn("Geolocation Error:", err);
                geoBtn.disabled = false;
                resultDiv.innerHTML = `<span class="error-text">Standortzugriff fehlgeschlagen.</span>`;
                manualContainer.style.display = 'block'; // Manuelle Eingabe einblenden
            },
            { timeout: 6000 }
        );
    });

    // Manuelle Eingabe
    manualBtn.addEventListener('click', async () => {
        const val = addressInput.value.trim();
        if (!val) return;

        manualBtn.disabled = true;
        const coords = await geocodeAddress(val);
        if (coords) {
            const d = haversine(coords.lat, coords.lon, TARGET.lat, TARGET.lon);
            showResult(d);
        }
        manualBtn.disabled = false;
    });
</script>

</body>
</html>
