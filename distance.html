<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entfernungsrechner - Gästehaus 22 Asten</title>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --brand: #2563eb;
            --brand-dark: #1e40af;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .header-icon {
            width: 56px;
            height: 56px;
            background: #dbeafe;
            color: var(--brand);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        h2 { margin: 0 0 0.5rem 0; font-size: 1.5rem; font-weight: 800; }
        .address { color: var(--text-light); font-size: 0.9rem; margin-bottom: 2rem; display: block; }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--brand);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .btn-primary:hover { background: var(--brand-dark); transform: translateY(-1px); }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text);
            margin-top: 1rem;
        }

        #manual-input-box {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            margin-bottom: 0.75rem;
            box-sizing: border-box;
            font-size: 1rem;
        }

        #result-box {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #eff6ff;
            border-radius: 1rem;
            display: none;
            border: 1px solid #dbeafe;
        }

        .distance-highlight {
            font-size: 2rem;
            font-weight: 900;
            color: var(--brand);
            display: block;
        }

        .maps-btn {
            margin-top: 1rem;
            color: var(--brand);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header-icon">
        <i data-lucide="map-pinned" size="28"></i>
    </div>
    <h2>Gästehaus 22</h2>
    <span class="address">Eichenstraße 22, 4481 Asten</span>
    
    <button id="geoBtn" class="btn btn-primary">
        <i data-lucide="navigation" size="18"></i>
        Distanz berechnen
    </button>

    <div id="manual-input-box">
        <p style="font-size: 0.85rem; color: var(--text-light);">Standortzugriff nicht möglich. Bitte gib deine Stadt ein:</p>
        <input type="text" id="manualInput" placeholder="z.B. Linz oder 4020">
        <button id="searchBtn" class="btn btn-secondary">Ort suchen</button>
    </div>
    
    <div id="result-box">
        <span class="distance-highlight" id="distValue">0.0 km</span>
        <span style="font-size: 0.9rem; color: var(--text-light);">Luftlinie zu uns</span>
        <a id="routeLink" class="maps-btn" target="_blank">
            <i data-lucide="external-link" size="14" style="margin-right: 4px;"></i>
            Route in Google Maps
        </a>
    </div>
</div>

<script>
    // PRÄZISE KOORDINATEN: Eichenstraße 22, 4481 Asten, Österreich
    const TARGET = { lat: 48.21245, lon: 14.41432 };

    const geoBtn = document.getElementById('geoBtn');
    const searchBtn = document.getElementById('searchBtn');
    const manualBox = document.getElementById('manual-input-box');
    const resultBox = document.getElementById('result-box');
    const distValue = document.getElementById('distValue');
    const routeLink = document.getElementById('routeLink');

    lucide.createIcons();

    function calculateHaversine(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * 
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function updateView(distance, userLat, userLon) {
        distValue.innerText = `${distance.toFixed(1)} km`;
        routeLink.href = `<https://www.google.com/maps/dir/?api=1&origin=${userLat},${userLon}&destination=${TARGET.lat},${TARGET.lon}&travelmode=driving>`;
        resultBox.style.display = 'block';
        manualBox.style.display = 'none';
        resultBox.scrollIntoView({ behavior: 'smooth' });
    }

    geoBtn.addEventListener('click', () => {
        geoBtn.disabled = true;
        distValue.innerText = "...";
        resultBox.style.display = 'block';

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const d = calculateHaversine(pos.coords.latitude, pos.coords.longitude, TARGET.lat, TARGET.lon);
                updateView(d, pos.coords.latitude, pos.coords.longitude);
                geoBtn.disabled = false;
            },
            () => {
                geoBtn.disabled = false;
                resultBox.style.display = 'none';
                manualBox.style.display = 'block';
            },
            { timeout: 8000 }
        );
    });

    searchBtn.addEventListener('click', async () => {
        const query = document.getElementById('manualInput').value.trim();
        if (!query) return;

        searchBtn.disabled = true;
        try {
            const res = await fetch(`<https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1>`, {
                headers: { 'User-Agent': 'Gaestehaus22App/1.0' }
            });
            const data = await res.json();
            if (data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                const d = calculateHaversine(lat, lon, TARGET.lat, TARGET.lon);
                updateView(d, lat, lon);
            } else {
                alert("Ort nicht gefunden.");
            }
        } catch (e) {
            alert("Fehler bei der Suche.");
        } finally {
            searchBtn.disabled = false;
        }
    });
</script>

</body>
</html>
